name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v
        env:
          AZURE_OPENAI_ENDPOINT: "https://test.openai.azure.com/"
          AZURE_OPENAI_KEY: "ci-placeholder"
          AZURE_OPENAI_DEPLOYMENT_NAME: "ci-placeholder"
          DOCUMENT_MAX_LENGTH: "10000"

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Deployment is intentionally stubbed.
      # To enable: add AZURE_PUBLISH_PROFILE as a repository secret and
      # replace this step with azure/functions-action@v1.
      # Ref: https://learn.microsoft.com/en-us/azure/azure-functions/functions-how-to-github-actions
      - name: Deploy placeholder
        run: echo "Deployment step not yet configured — see inline comment above."
